<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting — Jared Black</title>
  <link rel="canonical" href="https://black-jl.github.io/econvita/">
  <!-- No-JS fallback: redirect after a short delay so the analytics pixel (below) can load first. -->
  <meta http-equiv="refresh" content="3; url=https://black-jl.github.io/econvita/">
  <script>
    // Silent GoatCounter count for the legacy /vita URL, then redirect.
    // Uses an image pixel (fires immediately) and waits for it to resolve, so the
    // hit is recorded before we navigate away. Falls back to a 1s timeout.
    (function () {
      var dest = "https://black-jl.github.io/econvita/" + (location.hash || "");
      var go = function () { location.replace(dest); };
      var done = false;
      var redirect = function () { if (!done) { done = true; go(); } };
      var px = new Image();
      px.onload = px.onerror = redirect;
      px.src = "https://jaredblack.goatcounter.com/count"
             + "?p=" + encodeURIComponent("/vita")
             + "&t=" + encodeURIComponent("vita redirect")
             + "&r=" + encodeURIComponent(document.referrer);
      setTimeout(redirect, 1000); // fallback if the pixel is slow or blocked
    })();
  </script>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           color: #2b2b2b; max-width: 34rem; margin: 20vh auto; padding: 0 1.5rem; line-height: 1.6; }
    a { color: #12507e; }
  </style>
</head>
<body>
  <p>This site has moved to <a href="https://black-jl.github.io/econvita/">black-jl.github.io/econvita</a>.</p>
  <p>Redirecting you now…</p>
</body>
</html>
